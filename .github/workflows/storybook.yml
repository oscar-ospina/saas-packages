name: Deploy Storybook

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege + the OIDC token the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-flight deploy finish rather than
# cancelling it (avoids leaving the site half-published).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      # Storybook 10 emits relative asset paths, so the static build works
      # unchanged under the Pages project subpath (/saas-packages/) — verified.
      - name: Build Storybook
        run: npm run build-storybook --workspace=@saas/ui

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
