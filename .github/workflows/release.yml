name: Release

on:
  push:
    branches: [main]

# The changesets action needs to push the version commit and open the PR.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: do NOT set registry-url here. changesets/action writes its own
      # .npmrc from NPM_TOKEN; a second setup-node .npmrc is a known auth footgun.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Opens/updates a "Version Packages" PR when changesets are present;
      # publishes to npm when that PR is merged (requires NPM_TOKEN to be set).
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
